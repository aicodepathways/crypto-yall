name: Execute Intraday

on:
  schedule:
    - cron: '5 * * * *'       # Every hour at :05 UTC
  workflow_dispatch: {}

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute intraday trades on Hyperliquid
        run: python intraday_executor.py
        env:
          HL_PRIVATE_KEY: ${{ secrets.HL_PRIVATE_KEY }}
          HL_ACCOUNT_ADDRESS: ${{ secrets.HL_ACCOUNT_ADDRESS }}
          HL_TESTNET: ${{ vars.HL_TESTNET }}
          INTRADAY_CAPITAL: ${{ vars.INTRADAY_CAPITAL }}
          INTRADAY_DD_PCT: ${{ vars.INTRADAY_DD_PCT }}
          INTRADAY_MAX_POSITIONS: ${{ vars.INTRADAY_MAX_POSITIONS }}
          INTRADAY_KILL_SWITCH: ${{ vars.INTRADAY_KILL_SWITCH }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          INTRADAY_GIST_ID: ${{ secrets.INTRADAY_GIST_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
