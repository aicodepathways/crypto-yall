name: Execute Trades

on:
  schedule:
    - cron: '15 0 * * *'     # Daily at 00:15 UTC (15 min after signal refresh)
  workflow_dispatch: {}       # Manual trigger for testing

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute trades on Hyperliquid
        run: python hyperliquid_executor.py
        env:
          HL_PRIVATE_KEY: ${{ secrets.HL_PRIVATE_KEY }}
          HL_ACCOUNT_ADDRESS: ${{ secrets.HL_ACCOUNT_ADDRESS }}
          HL_TESTNET: ${{ vars.HL_TESTNET }}
          SEGREGATED_CAPITAL: ${{ vars.SEGREGATED_CAPITAL }}
          DAILY_DD_PCT: ${{ vars.DAILY_DD_PCT }}
          MAX_POSITIONS: ${{ vars.MAX_POSITIONS }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.TRADING_GIST_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
